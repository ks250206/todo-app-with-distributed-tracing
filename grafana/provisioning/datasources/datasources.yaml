apiVersion: 1

datasources:
  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    editable: false
    jsonData:
      derivedFields:
        - name: TraceID
          matcherRegex: '"trace_id":"([0-9a-f]{32})"'
          datasourceUid: jaeger
          url: '$${__value.raw}'
        - name: Caddy TraceID
          matcherRegex: '"traceID":"([0-9a-f]{32})"'
          datasourceUid: jaeger
          url: '$${__value.raw}'

  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090/prometheus
    editable: false

  - name: Jaeger
    uid: jaeger
    type: jaeger
    access: proxy
    url: http://jaeger:16686/jaeger
    editable: false
