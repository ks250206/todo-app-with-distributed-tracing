global:
  scrape_interval: 5s

scrape_configs:
  - job_name: otel-collector-spanmetrics
    static_configs:
      - targets: [otel-collector:8889]
  - job_name: otel-collector-internal
    static_configs:
      - targets: [otel-collector:8888]
  - job_name: loki
    static_configs:
      - targets: [loki:3100]
  - job_name: alloy
    static_configs:
      - targets: [alloy:12345]
